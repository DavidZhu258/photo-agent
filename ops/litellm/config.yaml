litellm_settings:
  drop_params: true
  json_logs: true
  request_timeout: 30
  success_callback:
    - langfuse
  failure_callback:
    - langfuse
  cache: true
  cache_params:
    type: redis
    host: photo-agent-redis
    port: 6379
    namespace: photo-agent-litellm
    ttl: 900
    supported_call_types:
      - acompletion
      - completion

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  disable_spend_logs: true
  allow_requests_on_db_unavailable: true
